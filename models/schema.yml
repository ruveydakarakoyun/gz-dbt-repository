version: 2

sources:
  - name: raw
    database: my-project-1404-493313
    schema: gz_raw_data
    description: Raw dataset loaded from Greenweez source systems

    tables:
      - name: sales
        identifier: raw_gz_sales
        description: Sales of Greenweez / we have on row per product_id found in each orders_id
        config:
          loaded_at_field: "CAST(date_date AS TIMESTAMP)"
          freshness:
            warn_after:
              count: 90
              period: day

        columns:
          - name: date_date
            description: Date of purchase
          - name: orders_id
            description: Unique order identifier
          - name: pdt_id
            description: Product identifier
          - name: revenue
            description: Revenue amount
          - name: quantity
            description: Quantity sold

        tests:
          - unique:
              column_name: "(orders_id || '-' || pdt_id)"

      - name: product
        identifier: raw_gz_product
        description: Product master data

        columns:
          - name: products_id
            description: Unique product identifier
            tests:
              - not_null
              - unique
          - name: purchse_price
            description: Original purchase price

      - name: ship
        identifier: raw_gz_ship
        description: Shipping and logistics information

        columns:
          - name: orders_id
            description: Order identifier
            tests:
              - not_null
              - unique
          - name: shipping_fee
            description: Shipping fee charged
          - name: ship_cost
            description: Shipping cost

      - name: adwords
        identifier: raw_gz_adwords
        description: Google Ads campaign data

      - name: bing
        identifier: raw_gz_bing
        description: Bing Ads campaign data

      - name: criteo
        identifier: raw_gz_criteo
        description: Criteo campaign data

      - name: facebook
        identifier: raw_gz_facebook
        description: Facebook Ads campaign data

models:
  - name: int_campaigns
    description: Combined marketing campaigns data from all advertising platforms

    columns:
      - name: campaign_key
        description: Campaign row identifier
        tests:
          - not_null

      - name: date_date
        description: Campaign date
        tests:
          - not_null

      - name: paid_source
        description: Advertising platform source
        tests:
          - not_null

      - name: campaign_name
        description: Campaign name
        tests:
          - not_null

      - name: ads_cost
        description: Advertising cost amount
        tests:
          - not_null

  - name: int_campaigns_day
    description: Daily aggregated advertising costs from all campaigns

    columns:
      - name: date_date
        description: Campaign date
        tests:
          - not_null
          - unique

      - name: ads_cost
        description: Total advertising cost per day
        tests:
          - not_null

  - name: finance_campaigns_day
    description: Daily finance KPIs combined with advertising campaign costs and performance

    columns:
      - name: date
        description: Date of the finance and advertising metrics
        tests:
          - not_null
          - unique


      - name: average_basket
        description: Average basket amount

      - name: operational_margin
        description: Operational margin before advertising cost

      - name: ads_cost
        description: Total advertising cost

      - name: ads_impression
        description: Total advertising impressions

      - name: ads_clicks
        description: Total advertising clicks

      - name: quantity
        description: Total quantity sold

      - name: revenue
        description: Total revenue

      - name: purchase_cost
        description: Total purchase cost

      - name: margin
        description: Revenue minus purchase cost

      - name: shipping_fee
        description: Total shipping fee

      - name: log_cost
        description: Total logistics cost

      - name: ship_cost
        description: Total shipping cost